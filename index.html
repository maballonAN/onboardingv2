<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Ready for Onboarding · Abogados Now</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --navy:#0a0e28;
    --navy2:#151a3d;
    --orange:#f4622b;
    --pink:#ec1e7a;
    --purple:#7b2ff7;
    --grad:linear-gradient(90deg,var(--orange),var(--pink),var(--purple));
    --bg:#f4f7fb;
    --card:#ffffff;
    --ink:#0a0e28;
    --muted:#5b6b82;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding-bottom:60px;
  }
  h1,h2,h3{font-family:'Poppins',sans-serif;}

  header{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#1d1449 100%);
    color:#fff;
    padding:40px 24px 70px;
    position:relative;
    overflow:hidden;
    text-align:center;
  }
  header::after{
    content:"";
    position:absolute;
    left:50%; top:-120px; transform:translateX(-50%);
    width:420px; height:420px;
    background:radial-gradient(circle, rgba(236,30,122,0.30), transparent 70%);
  }
  .header-inner{max-width:640px;margin:0 auto;position:relative;z-index:2;}
  .logo-row{display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
  .top-row{display:flex;justify-content:center;margin-bottom:16px;}
  .lang-switch{
    display:flex;background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:100px;padding:3px;flex:none;
  }
  .lang-switch button{
    border:none;background:transparent;color:#dbe6f5;
    font-family:'Inter',sans-serif;font-weight:700;font-size:12.5px;
    padding:6px 14px;border-radius:100px;cursor:pointer;
    transition:background .2s, color .2s;
  }
  .lang-switch button.active{background:#fff;color:var(--navy);}
  header h1{font-size:clamp(24px,4vw,34px);font-weight:800;margin:0 0 10px;line-height:1.2;}
  header p{font-size:15px;color:#c9d6ea;margin:0 auto;line-height:1.5;max-width:480px;}

  .laptop-alert{
    max-width:620px;margin:-40px auto 0;
    background:#fff;border-radius:var(--radius);
    box-shadow:0 20px 40px -12px rgba(11,31,58,0.25);
    padding:16px 22px;
    display:flex;gap:14px;align-items:flex-start;
    position:relative;z-index:3;
    border-left:6px solid var(--orange);
  }
  .laptop-alert .emoji{font-size:24px;line-height:1;}
  .laptop-alert strong{display:block;margin-bottom:2px;font-size:14px;}
  .laptop-alert span{color:var(--muted);font-size:13px;line-height:1.4;}

  main{max-width:620px;margin:32px auto 0;padding:0 24px;}

  /* Dot stepper */
  .stepper{display:flex;justify-content:center;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
  .stepper .dot-btn{
    width:34px;height:34px;border-radius:50%;border:2px solid #dde4f0;
    background:#fff;color:var(--muted);font-size:13px;font-weight:700;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:all .2s ease;
  }
  .stepper .dot-btn.current{border-color:var(--purple);color:var(--purple);transform:scale(1.12);}
  .stepper .dot-btn.complete{background:var(--grad);border-color:transparent;color:#fff;}

  /* Slim overall progress bar */
  .progress-wrap{
    background:var(--card);
    border-radius:100px;
    padding:10px 18px;
    box-shadow:0 4px 20px rgba(11,31,58,0.06);
    margin-bottom:26px;
    display:flex;align-items:center;gap:14px;
  }
  .progress-track{flex:1;height:10px;background:#e7edf5;border-radius:100px;overflow:hidden;}
  .progress-fill{height:100%;width:0%;border-radius:100px;background:var(--grad);transition:width .4s ease;}
  #progressLabel{font-weight:700;font-size:13px;white-space:nowrap;color:var(--navy);}

  /* Step card */
  .step-card{
    background:var(--card);
    border-radius:var(--radius);
    padding:32px 30px;
    box-shadow:0 10px 34px rgba(11,31,58,0.09);
    text-align:center;
    animation:fadeSlide .35s ease;
  }
  @keyframes fadeSlide{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  .step-icon{
    width:64px;height:64px;
    display:flex;align-items:center;justify-content:center;
    font-size:44px;margin:0 auto 18px;
  }
  .step-card h2{font-size:21px;font-weight:700;margin:0 0 10px;}
  .step-card .why{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 20px;}
  .how-list{
    text-align:left;background:#f7faff;border-radius:14px;
    padding:16px 18px;margin:0 0 22px;
  }
  .how-list ol{margin:0;padding-left:20px;color:#324259;font-size:13.5px;line-height:1.65;}
  .how-list li{margin-bottom:6px;}
  .how-list li:last-child{margin-bottom:0;}

  .step-check{
    display:inline-flex;align-items:center;gap:10px;
    background:#f2f5fb;padding:10px 20px;border-radius:100px;
    cursor:pointer;user-select:none;font-weight:700;font-size:14px;color:var(--muted);
    transition:background .2s, color .2s;
  }
  .step-check.checked{background:rgba(236,30,122,0.12);color:var(--pink);}
  .step-check input{width:20px;height:20px;accent-color:var(--pink);cursor:pointer;}

  .nav-buttons{display:flex;justify-content:space-between;gap:12px;margin-top:22px;}
  .nav-btn{
    flex:1;padding:13px 18px;border-radius:100px;border:none;
    font-weight:700;font-size:14px;cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .nav-btn.secondary{background:#eef1f7;color:var(--navy);}
  .nav-btn.secondary:disabled{opacity:0.4;cursor:not-allowed;}
  .nav-btn.primary{background:var(--grad);color:#fff;}

  /* Invite step */
  #attendeeEmails{
    width:100%;min-height:76px;
    border:1px solid #e2e8f2;border-radius:12px;
    padding:12px 14px;font-family:'Inter',sans-serif;font-size:13.5px;
    resize:vertical;color:var(--ink);margin-bottom:10px;
  }
  #attendeeEmails:focus{outline:none;border-color:var(--pink);}
  #inviteSentMsg{display:none;color:var(--purple);font-size:12.5px;font-weight:600;margin-top:8px;}

  /* Celebration screen */
  .celebrate-full{
    display:none;
    background:var(--grad);
    border-radius:var(--radius);
    padding:40px 30px;text-align:center;color:#fff;
    box-shadow:0 12px 34px rgba(123,47,247,0.3);
  }
  .celebrate-full .big{font-size:44px;margin-bottom:10px;}
  .celebrate-full h2{margin:0 0 8px;font-size:22px;}
  .celebrate-full p{margin:0 0 18px;font-size:14px;opacity:0.9;}
  .celebrate-full button{
    background:#fff;color:var(--navy);border:none;padding:12px 24px;
    border-radius:100px;font-weight:700;font-size:14px;cursor:pointer;
  }

  footer{max-width:620px;margin:30px auto 0;padding:0 24px;text-align:center;color:var(--muted);font-size:13px;}

  .welcome-screen{
    min-height:100vh;
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 55%,#1d1449 100%);
    display:flex;align-items:center;justify-content:center;
    padding:40px 24px;position:relative;overflow:hidden;
  }
  .welcome-screen::after{
    content:"";position:absolute;left:50%;top:-140px;transform:translateX(-50%);
    width:460px;height:460px;
    background:radial-gradient(circle, rgba(236,30,122,0.32), transparent 70%);
  }
  .welcome-inner{max-width:520px;text-align:center;position:relative;z-index:2;}
  .welcome-logo-img{height:40px;margin-bottom:26px;}
  .welcome-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);
    padding:7px 16px;border-radius:100px;color:#fff;font-size:13px;font-weight:600;
    margin-bottom:24px;
  }
  .welcome-inner h1{color:#fff;font-size:clamp(24px,4vw,34px);font-weight:800;margin:0 0 16px;line-height:1.3;}
  .welcome-inner p{color:#c9d6ea;font-size:15px;line-height:1.65;margin:0 0 32px;}
  .start-btn{
    background:var(--grad);color:#fff;border:none;
    padding:16px 34px;border-radius:100px;
    font-weight:700;font-size:16px;cursor:pointer;
    box-shadow:0 10px 30px rgba(236,30,122,0.35);
    font-family:'Poppins',sans-serif;
    transition:transform .15s ease;
  }
  .start-btn:hover{transform:translateY(-2px);}
  .welcome-lang{margin:0 auto 28px;width:fit-content;}

  @media print{
    header::after, .laptop-alert, .lang-switch, .nav-buttons{display:none !important;}
    body{background:#fff;}
  }
</style>
</head>

const itemKeys = ['fb','ads','domain','dl','logo','ein'];
const totalItems = itemKeys.length;
const totalSteps = itemKeys.length + 1; // + invite step
let currentLang = 'en';
let currentStep = 0; // 0..totalItems-1 = items, totalItems = invite step
const checkedState = {};
itemKeys.forEach(k => checkedState[k] = false);

function buildStepper(){
  const wrap = document.getElementById('stepperDots');
  wrap.innerHTML = '';
  for(let i=0;i<totalSteps;i++){
    const btn = document.createElement('button');
    btn.className = 'dot-btn';
    btn.textContent = (i === totalItems) ? '✉' : (i+1);
    btn.addEventListener('click', () => { currentStep = i; renderStep(); });
    wrap.appendChild(btn);
  }
}

function updateStepperClasses(){
  const dots = document.querySelectorAll('.dot-btn');
  dots.forEach((d, i) => {
    d.classList.toggle('current', i === currentStep);
    const key = itemKeys[i];
    d.classList.toggle('complete', key ? checkedState[key] : false);
  });
}

function updateProgress(){
  const done = itemKeys.filter(k => checkedState[k]).length;
  const t = i18n[currentLang];
  document.getElementById('progressLabel').textContent = t.progress(done, totalItems);
  const pct = Math.max(6, Math.round((done/totalItems)*100));
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderStep(){
  const t = i18n[currentLang];
  updateStepperClasses();
  updateProgress();

  const isInvite = currentStep === totalItems;
  document.getElementById('itemCheckWrap').style.display = isInvite ? 'none' : 'block';
  document.getElementById('inviteStepWrap').style.display = isInvite ? 'block' : 'none';
  document.getElementById('stepHowWrap').style.display = 'block';

  if(isInvite){
    document.getElementById('stepIcon').textContent = '✉️';
    document.getElementById('stepTitle').textContent = t.sectionInviteTitle;
    document.getElementById('stepWhy').textContent = t.inviteDesc;
    document.getElementById('stepHowWrap').style.display = 'none';
    document.getElementById('attendeeEmails').placeholder = t.invitePlaceholder;
    document.getElementById('sendInviteBtn').textContent = t.inviteButton;
    document.getElementById('inviteSentMsg').textContent = t.inviteSentMsg;
  } else {
    const key = itemKeys[currentStep];
    const item = t.items[key];
    document.getElementById('stepIcon').textContent = item.icon;
    document.getElementById('stepTitle').textContent = item.title;
    document.getElementById('stepWhy').textContent = item.why;
    const ol = document.getElementById('stepHow');
    ol.innerHTML = '';
    item.steps.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s;
      ol.appendChild(li);
    });
    document.getElementById('stepDoneLabel').textContent = t.doneLabel;
    const cb = document.getElementById('stepCheckbox');
    cb.checked = checkedState[key];
    document.getElementById('stepCheckLabel').classList.toggle('checked', checkedState[key]);
  }

  document.getElementById('prevBtn').textContent = t.prev;
  document.getElementById('prevBtn').disabled = (currentStep === 0);
  document.getElementById('nextBtn').textContent = isInvite ? t.finish : t.next;

  document.getElementById('t-celebrate-title').textContent = t.celebrateTitle;
  document.getElementById('t-celebrate-sub').textContent = t.celebrateSub;
  document.getElementById('restartBtn').textContent = t.restart;
  document.getElementById('t-laptop-strong').textContent = t.laptopStrong;
  document.getElementById('t-laptop-span').textContent = t.laptopSpan;
  document.getElementById('t-title').textContent = t.title;
  document.getElementById('t-subtitle').textContent = t.subtitle;
  document.getElementById('t-footer').innerHTML = t.footer;

  document.getElementById('stepCard').style.display = 'block';
  document.querySelector('.nav-buttons').style.display = 'flex';
  document.getElementById('celebrateFull').style.display = 'none';
}

document.getElementById('stepCheckbox').addEventListener('change', (e) => {
  const key = itemKeys[currentStep];
  if(key){
    checkedState[key] = e.target.checked;
    document.getElementById('stepCheckLabel').classList.toggle('checked', e.target.checked);
    updateStepperClasses();
    updateProgress();
  }
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if(currentStep > 0){ currentStep--; renderStep(); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if(currentStep < totalSteps - 1){
    currentStep++;
    renderStep();
  } else {
    document.getElementById('stepCard').style.display = 'none';
    document.querySelector('.nav-buttons').style.display = 'none';
    document.getElementById('celebrateFull').style.display = 'block';
  }
});
document.getElementById('restartBtn').addEventListener('click', () => {
  currentStep = 0;
  renderStep();
});

function renderWelcome(lang){
  const t = i18n[lang];
  document.getElementById('w-badge').textContent = t.welcomeBadge;
  document.getElementById('w-title').textContent = t.welcomeTitle;
  document.getElementById('w-body').textContent = t.welcomeBody;
  document.getElementById('startBtn').textContent = t.startButton;
  document.getElementById('w-btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('w-btn-es').classList.toggle('active', lang === 'es');
}

function setLang(lang){
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  renderStep();
  renderWelcome(lang);
}

document.getElementById('btn-en').addEventListener('click', () => setLang('en'));
document.getElementById('btn-es').addEventListener('click', () => setLang('es'));
document.getElementById('w-btn-en').addEventListener('click', () => setLang('en'));
document.getElementById('w-btn-es').addEventListener('click', () => setLang('es'));

document.getElementById('sendInviteBtn').addEventListener('click', () => {
  const t = i18n[currentLang];
  const raw = document.getElementById('attendeeEmails').value.trim();
  const emailList = raw ? raw.split(/[,\n;]+/).map(e => e.trim()).filter(Boolean) : [];
  const checklistLines = itemKeys.map(key => {
    const label = t.items[key].title;
    return `- ${label}: ${checkedState[key] ? t.mailDone : t.mailPending}`;
  }).join('\n');
  const attendeesBlock = emailList.length ? emailList.join('\n') : t.mailNoAttendees;
  const body = [
    t.mailGreeting, '', t.mailBodyIntro, '', attendeesBlock, '',
    t.mailChecklistIntro, checklistLines, '', t.mailSignoff
  ].join('\n');
  const mailto = 'mailto:j.narvaja@abogadosnow.com'
    + '?subject=' + encodeURIComponent(t.mailSubject)
    + '&body=' + encodeURIComponent(body);
  window.location.href = mailto;
  document.getElementById('inviteSentMsg').style.display = 'block';
});

document.getElementById('btn-en').classList.add('active');
buildStepper();
renderStep();
renderWelcome(currentLang);

function revealApp(){
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  const fillEl = document.getElementById('progressFill');
  requestAnimationFrame(() => {
    setTimeout(() => {
      fillEl.style.width = '18%';
      setTimeout(() => { updateProgress(); }, 550);
    }, 250);
  });
}

document.getElementById('startBtn').addEventListener('click', revealApp);
</script>
